<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動報名 - SportsPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
</head>
<body class="bg-gray-50" x-data="eventList()" x-init="init()">

  <nav class="bg-white shadow" x-data="navbar()" x-init="init()">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <a href="/" class="font-bold text-xl text-blue-600">🏃 SportsPlatform</a>
        <span class="text-gray-300">›</span>
        <span class="text-sm text-gray-500">活動報名</span>
      </div>
      <div class="flex items-center gap-3">
        <template x-if="!loggedIn">
          <a href="/member/login.html" class="text-sm bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700">登入</a>
        </template>
        <template x-if="loggedIn">
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-600">👋 <span x-text="memberName"></span></span>
            <a href="/member/profile.html" class="text-sm border border-blue-600 text-blue-600 px-3 py-1.5 rounded hover:bg-blue-50">會員中心</a>
            <button @click="logout()" class="text-sm text-gray-400 hover:text-red-500">登出</button>
          </div>
        </template>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">活動報名</h1>
    <p class="text-gray-500 text-sm mb-6">路跑、鐵人、登山、各類運動賽事一次報名</p>

    <!-- 分類篩選 -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <template x-for="cat in categories">
        <button @click="filterCat(cat)"
          :class="selectedCat===cat ? 'bg-blue-600 text-white' : 'bg-white border text-gray-600 hover:border-blue-400'"
          class="px-4 py-1.5 rounded-full text-sm transition" x-text="cat"></button>
      </template>
    </div>

    <!-- 活動 Grid -->
    <div x-show="loading" class="text-center py-20 text-gray-400">載入中...</div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
      <template x-for="e in events" :key="e.id">
        <a :href="'/events/detail.html?slug=' + e.slug"
          class="bg-white rounded-xl shadow hover:shadow-md transition overflow-hidden group">
          <div class="relative">
            <img :src="e.cover_image || '/assets/img/event-placeholder.jpg'"
              class="w-full h-44 object-cover group-hover:scale-105 transition duration-300">
            <span class="absolute top-3 left-3 text-xs bg-blue-600 text-white px-2 py-0.5 rounded-full"
              x-text="e.category"></span>
          </div>
          <div class="p-4">
            <h3 class="font-semibold text-sm line-clamp-2 mb-2" x-text="e.title"></h3>
            <div class="text-xs text-gray-500 space-y-1">
              <div>📅 <span x-text="e.event_date"></span></div>
              <div>📍 <span x-text="e.location"></span></div>
            </div>
            <div class="mt-3 flex justify-between items-center">
              <span class="text-xs"
                :class="isRegOpen(e) ? 'text-green-600' : 'text-gray-400'"
                x-text="isRegOpen(e) ? '✅ 報名中' : '⏸ 報名未開放'"></span>
              <span class="text-xs text-blue-600 group-hover:underline">查看詳情 →</span>
            </div>
          </div>
        </a>
      </template>
    </div>

    <div x-show="!loading && events.length===0" class="text-center py-20 text-gray-400">
      <div class="text-4xl mb-3">🎌</div>
      <div>目前沒有符合的活動</div>
    </div>

    <!-- 分頁 -->
    <div x-show="total > limit" class="flex justify-center gap-2 mt-8">
      <button @click="page--; load()" :disabled="page===1"
        class="px-4 py-2 border rounded text-sm disabled:opacity-30 hover:bg-gray-100">上一頁</button>
      <span class="px-4 py-2 text-sm text-gray-500" x-text="'第 ' + page + ' / ' + Math.ceil(total/limit) + ' 頁'"></span>
      <button @click="page++; load()" :disabled="page * limit >= total"
        class="px-4 py-2 border rounded text-sm disabled:opacity-30 hover:bg-gray-100">下一頁</button>
    </div>
  </div>

<script>

function navbar() {
  return {
    loggedIn: false,
    memberName: '',
    init() {
      this.loggedIn = !!localStorage.getItem('access_token');
      const member = localStorage.getItem('member_info');
      if (member) {
        try { this.memberName = JSON.parse(member).name || '會員'; } catch(e) {}
      }
    },
    logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('member_info');
      window.location.href = '/';
    }
  }
}
function eventList() {
  return {
    events: [], total: 0,
    page: 1, limit: 9,
    categories: ['全部','路跑','鐵人三項','登山','自行車','游泳','其他'],
    selectedCat: '全部',
    loading: true,

    async init() { await this.load(); },

    filterCat(cat) {
      this.selectedCat = cat;
      this.page = 1;
      this.load();
    },

    async load() {
      this.loading = true;
      let url = `/events?page=${this.page}&limit=${this.limit}`;
      if (this.selectedCat !== '全部') url += `&category=${encodeURIComponent(this.selectedCat)}`;
      const res = await api.get(url);
      this.events = (res && res.data) || [];
      this.total = (res && res.total) || 0;
      this.loading = false;
    },

    isRegOpen(e) {
      const now = new Date();
      if (e.reg_start_at && new Date(e.reg_start_at) > now) return false;
      if (e.reg_end_at && new Date(e.reg_end_at) < now) return false;
      return true;
    }
  }
}
</script>
</body>
</html>
