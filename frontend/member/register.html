<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申請加入 - SportsPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-8">
<div class="w-full max-w-md px-4" x-data="registerForm()">
  <div class="text-center mb-6">
    <a href="/" class="text-2xl font-bold text-blue-600">🏃 SportsPlatform</a>
  </div>
  <div class="bg-white shadow-md rounded-xl p-8">
    <h1 class="text-xl font-bold mb-1">申請成為會員</h1>
    <p class="text-sm text-gray-500 mb-6">填寫資料後，待管理員審核通過即可登入</p>

    <!-- 成功提示 -->
    <div x-show="success" class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
      <div class="text-green-700 font-semibold text-sm mb-1">✅ 申請已送出！</div>
      <p class="text-green-600 text-sm">您的帳號正在等待管理員審核，審核通過後即可登入。</p>
      <a href="/member/login.html" class="text-sm text-green-700 underline mt-2 inline-block">← 前往登入頁</a>
    </div>

    <div x-show="!success">
      <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-lg mb-4" x-text="error"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            會員編號 <span class="text-red-500">*</span>
            <span class="text-xs text-gray-400 font-normal ml-1">（如：A2025001，建立後不可更改）</span>
          </label>
          <input type="text" x-model="form.member_no"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="A2025001">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
          <input type="text" x-model="form.name"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
          <input type="email" x-model="form.email"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">手機</label>
          <input type="tel" x-model="form.phone"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="0912345678">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼 <span class="text-red-500">*</span> <span class="text-xs text-gray-400 font-normal">（至少 8 字元）</span></label>
          <input type="password" x-model="form.password"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">確認密碼 <span class="text-red-500">*</span></label>
          <input type="password" x-model="form.confirm"
            class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            @keydown.enter="submit()">
        </div>
        <button @click="submit()" :disabled="loading"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-blue-700 disabled:opacity-50 transition">
          <span x-text="loading ? '送出中...' : '送出申請'"></span>
        </button>
      </div>

      <div class="mt-4 text-center text-sm text-gray-500">
        已有帳號？<a href="/member/login.html" class="text-blue-600 hover:underline">前往登入</a>
      </div>
    </div>
  </div>
</div>

<script>
function registerForm() {
  return {
    form: { member_no: '', name: '', email: '', phone: '', password: '', confirm: '' },
    loading: false, error: '', success: false,

    async submit() {
      this.error = '';
      if (!this.form.member_no) { this.error = '請填寫會員編號'; return; }
      if (!this.form.name)      { this.error = '請填寫姓名'; return; }
      if (!this.form.email)     { this.error = '請填寫 Email'; return; }
      if (this.form.password.length < 8) { this.error = '密碼至少 8 個字元'; return; }
      if (this.form.password !== this.form.confirm) { this.error = '密碼與確認密碼不一致'; return; }

      this.loading = true;
      try {
        const res = await api.post('/auth/register', {
          member_no: this.form.member_no,
          name:      this.form.name,
          email:     this.form.email,
          phone:     this.form.phone,
          password:  this.form.password,
        });
        if (res && res.member) {
          this.success = true;
        } else {
          this.error = (res && res.error) || '申請失敗，請稍後再試';
        }
      } catch(e) {
        this.error = '系統錯誤，請稍後再試';
      }
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
