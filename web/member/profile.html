<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員中心 - SportsPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
</head>
<body class="bg-gray-50" x-data="profilePage()" x-init="init()">

  <nav class="bg-white shadow px-6 flex items-center justify-between h-16">
    <div class="flex items-center gap-3">
      <a href="/" class="font-bold text-xl text-blue-600">🏃 SportsPlatform</a>
      <span class="text-gray-300">›</span>
      <span class="text-sm text-gray-500">會員中心</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-600" x-text="member ? '👋 ' + member.name : ''"></span>
      <button @click="auth.logout()" class="text-sm text-gray-400 hover:text-red-500">登出</button>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-8 flex gap-6">

    <!-- 左側選單 -->
    <aside class="w-48 shrink-0">
      <nav class="space-y-1">
        <button @click="tab='profile'"
          :class="tab==='profile' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full text-left px-3 py-2 rounded text-sm">👤 基本資料</button>
        <button @click="tab='password'"
          :class="tab==='password' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full text-left px-3 py-2 rounded text-sm">🔒 修改密碼</button>
        <button @click="tab='addresses'"
          :class="tab==='addresses' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full text-left px-3 py-2 rounded text-sm">📍 收件地址</button>
        <button @click="tab='registrations'"
          :class="tab==='registrations' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-gray-600 hover:bg-gray-100'"
          class="w-full text-left px-3 py-2 rounded text-sm">🏅 我的報名</button>
        <a href="/member/orders.html"
          class="block text-gray-600 hover:bg-gray-100 px-3 py-2 rounded text-sm">📦 我的訂單</a>
      </nav>
    </aside>

    <!-- 右側內容 -->
    <main class="flex-1">

      <!-- 基本資料 -->
      <div x-show="tab==='profile'" class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-bold mb-4">基本資料</h2>
        <div x-show="msg" class="mb-4 p-3 rounded text-sm"
          :class="msgType==='ok' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'"
          x-text="msg"></div>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">姓名 *</label>
              <input type="text" x-model="form.name" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">手機</label>
              <input type="tel" x-model="form.phone" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">性別</label>
              <select x-model="form.gender" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
                <option value="0">不填寫</option>
                <option value="1">男</option>
                <option value="2">女</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">生日</label>
              <input type="date" x-model="form.birthday" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" :value="member && member.email" disabled
              class="w-full border bg-gray-50 rounded px-3 py-2 text-sm text-gray-400">
          </div>
          <div class="flex justify-end">
            <button @click="saveProfile()" :disabled="saving"
              class="bg-blue-600 text-white px-5 py-2 rounded text-sm font-semibold hover:bg-blue-700 disabled:opacity-50">
              <span x-text="saving ? '儲存中...' : '儲存變更'"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- 修改密碼 -->
      <div x-show="tab==='password'" class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-bold mb-4">修改密碼</h2>
        <div x-show="pwMsg" class="mb-4 p-3 rounded text-sm"
          :class="pwMsgType==='ok' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'"
          x-text="pwMsg"></div>
        <div class="space-y-4 max-w-sm">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">目前密碼</label>
            <input type="password" x-model="pw.old" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">新密碼（至少 8 字元）</label>
            <input type="password" x-model="pw.new" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">確認新密碼</label>
            <input type="password" x-model="pw.confirm" class="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none">
          </div>
          <button @click="changePassword()" :disabled="pwSaving"
            class="bg-blue-600 text-white px-5 py-2 rounded text-sm font-semibold hover:bg-blue-700 disabled:opacity-50">
            <span x-text="pwSaving ? '處理中...' : '更新密碼'"></span>
          </button>
        </div>
      </div>

      <!-- 收件地址 -->
      <div x-show="tab==='addresses'" class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-bold">收件地址</h2>
          <button @click="showAddrForm=true; editAddr=null; resetAddrForm()"
            class="text-sm bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700">+ 新增地址</button>
        </div>

        <!-- 地址列表 -->
        <div class="space-y-3">
          <template x-for="addr in addresses" :key="addr.id">
            <div class="border rounded-lg p-4 flex justify-between items-start"
              :class="addr.is_default ? 'border-blue-400 bg-blue-50' : ''">
              <div>
                <div class="flex gap-2 items-center mb-1">
                  <span class="font-medium text-sm" x-text="addr.label || '地址'"></span>
                  <span x-show="addr.is_default" class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded">預設</span>
                </div>
                <div class="text-sm text-gray-700" x-text="addr.recipient + ' · ' + addr.phone"></div>
                <div class="text-sm text-gray-500 mt-0.5"
                  x-text="addr.zip + ' ' + addr.city + addr.district + addr.address"></div>
              </div>
              <div class="flex gap-2 shrink-0">
                <button @click="startEditAddr(addr)" class="text-xs text-blue-600 hover:underline">編輯</button>
                <button @click="deleteAddr(addr.id)" class="text-xs text-red-500 hover:underline">刪除</button>
              </div>
            </div>
          </template>
          <div x-show="addresses.length===0" class="text-sm text-gray-400 text-center py-8">尚未新增地址</div>
        </div>

        <!-- 新增/編輯表單 -->
        <div x-show="showAddrForm" class="mt-6 border-t pt-6">
          <h3 class="font-semibold mb-3 text-sm" x-text="editAddr ? '編輯地址' : '新增地址'"></h3>
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">標籤（如：家、公司）</label>
              <input type="text" x-model="addrForm.label" placeholder="家" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">收件人 *</label>
              <input type="text" x-model="addrForm.recipient" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">手機 *</label>
              <input type="tel" x-model="addrForm.phone" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">郵遞區號</label>
              <input type="text" x-model="addrForm.zip" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">縣市 *</label>
              <input type="text" x-model="addrForm.city" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">鄉鎮市區 *</label>
              <input type="text" x-model="addrForm.district" class="w-full border rounded px-3 py-1.5 text-sm">
            </div>
          </div>
          <div class="mb-3">
            <label class="block text-xs font-medium text-gray-600 mb-1">詳細地址 *</label>
            <input type="text" x-model="addrForm.address" class="w-full border rounded px-3 py-1.5 text-sm">
          </div>
          <div class="flex items-center gap-2 mb-4">
            <input type="checkbox" x-model="addrForm.is_default" id="is_default">
            <label for="is_default" class="text-sm text-gray-600">設為預設地址</label>
          </div>
          <div class="flex gap-2">
            <button @click="saveAddr()" :disabled="addrSaving"
              class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm hover:bg-blue-700 disabled:opacity-50">
              <span x-text="addrSaving ? '儲存中...' : '儲存'"></span>
            </button>
            <button @click="showAddrForm=false" class="border px-4 py-1.5 rounded text-sm hover:bg-gray-50">取消</button>
          </div>
        </div>
      </div>

      <!-- 我的報名 -->
      <div x-show="tab==='registrations'" class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-bold mb-4">我的報名記錄</h2>
        <div x-show="regLoading" class="text-sm text-gray-400 text-center py-8">載入中...</div>
        <div class="space-y-3">
          <template x-for="reg in registrations" :key="reg.id">
            <div class="border rounded-lg p-4">
              <div class="flex justify-between items-start">
                <div>
                  <div class="font-semibold" x-text="reg.event_title"></div>
                  <div class="text-sm text-gray-500 mt-1">
                    📅 <span x-text="reg.event_date"></span>
                    &nbsp;📍 <span x-text="reg.event_location"></span>
                  </div>
                  <div class="text-sm text-gray-600 mt-1">參加者：<span x-text="reg.participant"></span></div>
                </div>
                <span class="text-xs px-2 py-1 rounded-full"
                  :class="reg.status===1 ? 'bg-green-100 text-green-700' : reg.status===2 ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'"
                  x-text="reg.status===1 ? '已確認' : reg.status===2 ? '已取消' : '待確認'"></span>
              </div>
            </div>
          </template>
          <div x-show="!regLoading && registrations.length===0" class="text-sm text-gray-400 text-center py-8">尚未報名任何活動</div>
        </div>
      </div>

    </main>
  </div>

<script>
function profilePage() {
  return {
    tab: 'profile',
    member: null,
    form: { name:'', phone:'', gender: 0, birthday:'', avatar_url:'' },
    saving: false, msg:'', msgType:'ok',
    pw: { old:'', new:'', confirm:'' },
    pwSaving: false, pwMsg:'', pwMsgType:'ok',
    addresses: [],
    showAddrForm: false, editAddr: null, addrSaving: false,
    addrForm: { label:'', recipient:'', phone:'', zip:'', city:'', district:'', address:'', is_default: false },
    registrations: [], regLoading: false,

    async init() {
      auth.requireLogin();
      const res = await api.get('/me');
      if (res && res.data) {
        this.member = res.data;
        this.form = {
          name: res.data.name || '',
          phone: res.data.phone || '',
          gender: res.data.gender || 0,
          birthday: res.data.birthday ? res.data.birthday.substring(0,10) : '',
          avatar_url: res.data.avatar_url || ''
        };
      }
      await this.loadAddresses();
    },

    async saveProfile() {
      this.saving = true; this.msg = '';
      const res = await api.put('/me', this.form);
      if (res && res.data) {
        this.msg = '資料已更新'; this.msgType = 'ok';
        auth.setMember(res.data);
      } else {
        this.msg = (res && res.error) || '更新失敗'; this.msgType = 'err';
      }
      this.saving = false;
    },

    async changePassword() {
      if (this.pw.new !== this.pw.confirm) {
        this.pwMsg = '新密碼與確認密碼不一致'; this.pwMsgType = 'err'; return;
      }
      if (this.pw.new.length < 8) {
        this.pwMsg = '新密碼至少 8 個字元'; this.pwMsgType = 'err'; return;
      }
      this.pwSaving = true; this.pwMsg = '';
      const res = await api.put('/me/password', { old_password: this.pw.old, new_password: this.pw.new });
      if (res && res.message) {
        this.pwMsg = '密碼已更新'; this.pwMsgType = 'ok';
        this.pw = { old:'', new:'', confirm:'' };
      } else {
        this.pwMsg = (res && res.error) || '更新失敗'; this.pwMsgType = 'err';
      }
      this.pwSaving = false;
    },

    async loadAddresses() {
      const res = await api.get('/me/addresses');
      this.addresses = (res && res.data) || [];
    },

    resetAddrForm() {
      this.addrForm = { label:'', recipient:'', phone:'', zip:'', city:'', district:'', address:'', is_default: false };
    },

    startEditAddr(addr) {
      this.editAddr = addr;
      this.addrForm = { ...addr, is_default: addr.is_default === 1 };
      this.showAddrForm = true;
    },

    async saveAddr() {
      this.addrSaving = true;
      const payload = { ...this.addrForm, is_default: this.addrForm.is_default ? 1 : 0 };
      let res;
      if (this.editAddr) {
        res = await api.put('/me/addresses/' + this.editAddr.id, payload);
      } else {
        res = await api.post('/me/addresses', payload);
      }
      if (res && (res.message || res.data)) {
        await this.loadAddresses();
        this.showAddrForm = false;
      }
      this.addrSaving = false;
    },

    async deleteAddr(id) {
      if (!confirm('確定刪除這個地址？')) return;
      await api.delete('/me/addresses/' + id);
      await this.loadAddresses();
    },

    async loadRegistrations() {
      this.regLoading = true;
      const res = await api.get('/me/registrations');
      this.registrations = (res && res.data) || [];
      this.regLoading = false;
    },

    // Watch tab change to load registrations lazily
    get tabWatcher() {
      if (this.tab === 'registrations' && this.registrations.length === 0) {
        this.loadRegistrations();
      }
      return this.tab;
    }
  }
}
</script>
</body>
</html>
