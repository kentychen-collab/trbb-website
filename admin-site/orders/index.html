<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>訂單管理 - SportsPlatform Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-dark navbar-gray-dark">
    <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
    <ul class="navbar-nav ml-auto"><li class="nav-item"><a class="nav-link" href="#" onclick="adminAuth.logout()"><i class="fas fa-sign-out-alt"></i></a></li></ul>
  </nav>
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/admin/" class="brand-link"><span class="brand-text font-weight-light">🏃 SportsPlatform</span></a>
    <div class="sidebar"><nav class="mt-2"><ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
      <li class="nav-item"><a href="/admin/" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
      <li class="nav-item"><a href="/admin/members/" class="nav-link"><i class="nav-icon fas fa-users"></i><p>會員管理</p></a></li>
      <li class="nav-item"><a href="/admin/events/" class="nav-link"><i class="nav-icon fas fa-calendar-alt"></i><p>活動管理</p></a></li>
      <li class="nav-item"><a href="/admin/products/" class="nav-link"><i class="nav-icon fas fa-box"></i><p>商品管理</p></a></li>
      <li class="nav-item"><a href="/admin/orders/" class="nav-link active"><i class="nav-icon fas fa-shopping-cart"></i><p>訂單管理</p></a></li>
      <li class="nav-item" id="nav-admins"><a href="/admin/admins/" class="nav-link"><i class="nav-icon fas fa-user-shield"></i><p>管理員帳號</p></a></li>
    </ul></nav></div>
  </aside>

  <div class="content-wrapper">
    <div class="content-header"><div class="container-fluid">
      <h1 class="m-0">訂單管理</h1>
    </div></div>
    <section class="content"><div class="container-fluid">

      <!-- 狀態篩選 -->
      <ul class="nav nav-tabs mb-3" id="status-tabs">
        <li class="nav-item"><a class="nav-link active" href="#" onclick="filterStatus(null,this)">全部</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(0,this)">⏳ 待付款</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(1,this)">✅ 已付款</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(2,this)">📦 備貨中</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(3,this)">🚚 已出貨</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(4,this)">✔ 完成</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="filterStatus(5,this)">✕ 取消</a></li>
      </ul>

      <div class="card">
        <div class="card-body p-0">
          <table class="table table-bordered table-hover mb-0">
            <thead><tr>
              <th>訂單編號</th><th>類型</th><th>金額</th><th>付款</th><th>狀態</th><th>建立時間</th><th>操作</th>
            </tr></thead>
            <tbody id="list-body"><tr><td colspan="7" class="text-center py-4">載入中...</td></tr></tbody>
          </table>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <span id="total-info" class="text-muted small"></span>
          <div id="pagination" class="d-flex" style="gap:4px"></div>
        </div>
      </div>
    </div></section>
  </div>
  <footer class="main-footer text-center text-sm">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/admin/assets/js/api.js"></script>
<script>
adminAuth.requireLogin();
if (!adminAuth.isSuperAdmin()) document.getElementById('nav-admins').style.display = 'none';

let page = 1, limit = 20, total = 0, currentStatus = null;

const orderType  = { 1:'購物', 2:'團報', 3:'二手' };
const orderStatus = {
  0:'<span class="badge badge-secondary">待付款</span>',
  1:'<span class="badge badge-info">已付款</span>',
  2:'<span class="badge badge-primary">備貨中</span>',
  3:'<span class="badge badge-warning">已出貨</span>',
  4:'<span class="badge badge-success">完成</span>',
  5:'<span class="badge badge-danger">取消</span>',
};
const payStatus = {
  0:'<span class="badge badge-secondary">未付</span>',
  1:'<span class="badge badge-success">已付</span>',
  2:'<span class="badge badge-warning">退款</span>',
};
const nextStatus = { 1:2, 2:3, 3:4 };
const nextLabel  = { 2:'→備貨中', 3:'→已出貨', 4:'→完成' };

async function loadList() {
  let url = `/orders?page=${page}&limit=${limit}`;
  if (currentStatus !== null) url += `&status=${currentStatus}`;
  const res = await adminApi.get(url);
  total = (res && res.total) || 0;
  const body = document.getElementById('list-body');
  if (!res || !res.data || res.data.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">暫無資料</td></tr>';
    document.getElementById('total-info').textContent = '共 0 筆';
    return;
  }
  body.innerHTML = res.data.map(o => {
    const next = nextStatus[o.status];
    const btnNext = next
      ? `<button class="btn btn-xs btn-info mr-1" onclick="updateStatus(${o.id},${next})">${nextLabel[next]}</button>`
      : '';
    const btnCancel = (o.status < 4 && o.status !== 5)
      ? `<button class="btn btn-xs btn-danger" onclick="updateStatus(${o.id},5)">取消</button>`
      : '';
    return `<tr>
      <td><code class="text-sm">${o.order_no}</code></td>
      <td>${orderType[o.type] || '-'}</td>
      <td>NT$ ${(o.final_amount||0).toLocaleString()}</td>
      <td>${payStatus[o.payment_status] || '-'}</td>
      <td>${orderStatus[o.status] || o.status}</td>
      <td>${o.created_at ? o.created_at.substring(0,16) : '-'}</td>
      <td>${btnNext}${btnCancel}</td>
    </tr>`;
  }).join('');
  document.getElementById('total-info').textContent = `共 ${total} 筆`;
  renderPagination();
}

async function updateStatus(id, status) {
  const labels = {2:'備貨中',3:'已出貨',4:'完成',5:'取消'};
  if (!confirm(`確定更新為「${labels[status]}」？`)) return;
  const res = await adminApi.put(`/orders/${id}/status`, { status });
  if (res && res.message) loadList();
  else alert((res && res.error) || '操作失敗');
}

function filterStatus(status, el) {
  event.preventDefault();
  currentStatus = status; page = 1;
  document.querySelectorAll('#status-tabs .nav-link').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  loadList();
}

function renderPagination() {
  const totalPages = Math.ceil(total / limit);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="btn btn-sm btn-outline-secondary" onclick="page--;loadList()" ${page===1?'disabled':''}>«</button>
    <span class="align-self-center small px-2">${page} / ${totalPages}</span>
    <button class="btn btn-sm btn-outline-secondary" onclick="page++;loadList()" ${page>=totalPages?'disabled':''}>»</button>
  `;
}

loadList();
</script>
</body>
</html>
