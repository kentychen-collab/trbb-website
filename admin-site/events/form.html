<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>活動表單 - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>.img-preview{width:100px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #ddd}</style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-dark navbar-gray-dark">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="/admin/events/">← 返回列表</a></li>
    </ul>
    <ul class="navbar-nav ml-auto"><li class="nav-item"><a class="nav-link" href="#" onclick="adminAuth.logout()"><i class="fas fa-sign-out-alt"></i></a></li></ul>
  </nav>

  <div class="content-wrapper p-4" x-data="eventForm()" x-init="init()">
    <h4 class="mb-4" x-text="isEdit ? '編輯活動' : '新增活動'"></h4>

    <div x-show="successMsg" class="alert alert-success" x-text="successMsg"></div>
    <div x-show="errorMsg"   class="alert alert-danger"  x-text="errorMsg"></div>

    <div class="row">
      <!-- 左欄 -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">活動資訊</h5></div>
          <div class="card-body">
            <div class="form-group">
              <label>活動名稱 *</label>
              <input type="text" x-model="form.title" class="form-control">
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>網址 Slug *</label>
                  <input type="text" x-model="form.slug" class="form-control" placeholder="taipei-run-2025">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>類別</label>
                  <select x-model="form.category" class="form-control">
                    <option value="路跑">路跑</option>
                    <option value="鐵人三項">鐵人三項</option>
                    <option value="登山">登山</option>
                    <option value="自行車">自行車</option>
                    <option value="游泳">游泳</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>活動日期 *</label>
                  <input type="date" x-model="form.event_date" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>活動地點</label>
                  <input type="text" x-model="form.location" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>報名開始</label>
                  <input type="datetime-local" x-model="form.reg_start_at" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>報名截止</label>
                  <input type="datetime-local" x-model="form.reg_end_at" class="form-control">
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>最大名額（空白=不限）</label>
              <input type="number" x-model="form.max_quota" class="form-control" min="1">
            </div>
            <div class="form-group">
              <label>活動說明</label>
              <textarea x-model="form.description" class="form-control" rows="6"></textarea>
            </div>
          </div>
        </div>

        <!-- 封面圖片 -->
        <div class="card mt-3">
          <div class="card-header"><h5 class="card-title mb-0">封面圖片</h5></div>
          <div class="card-body d-flex align-items-center gap-3">
            <img x-show="form.cover_image" :src="form.cover_image" class="img-preview">
            <div x-show="!form.cover_image" class="img-preview d-flex align-items-center justify-content-center bg-light text-muted"><span>無圖片</span></div>
            <div>
              <label class="btn btn-outline-secondary btn-sm" style="cursor:pointer">
                <i class="fas fa-upload"></i>
                <span x-text="coverUploading ? '上傳中...' : '選擇圖片'"></span>
                <input type="file" accept="image/*" class="d-none" @change="uploadCover($event)">
              </label>
              <button x-show="form.cover_image" @click="form.cover_image=''" class="btn btn-outline-danger btn-sm ml-1">移除</button>
              <p x-show="coverError" class="text-danger small mt-1" x-text="coverError"></p>
            </div>
          </div>
        </div>

        <!-- 票種 -->
        <div class="card mt-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">票種設定</h5>
            <button @click="addTicket()" class="btn btn-sm btn-outline-primary">+ 新增票種</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-sm mb-0">
              <thead><tr><th>票種名稱</th><th>價格</th><th>名額</th><th>報名開始</th><th>報名截止</th><th></th></tr></thead>
              <tbody>
                <template x-for="(t, i) in form.tickets" :key="i">
                  <tr>
                    <td><input type="text" x-model="t.name" class="form-control form-control-sm" placeholder="早鳥票"></td>
                    <td><input type="number" x-model="t.price" class="form-control form-control-sm" min="0"></td>
                    <td><input type="number" x-model="t.quota" class="form-control form-control-sm" placeholder="不限"></td>
                    <td><input type="datetime-local" x-model="t.reg_start" class="form-control form-control-sm"></td>
                    <td><input type="datetime-local" x-model="t.reg_end" class="form-control form-control-sm"></td>
                    <td><button @click="form.tickets.splice(i,1)" class="btn btn-xs btn-danger">✕</button></td>
                  </tr>
                </template>
                <tr x-show="form.tickets.length===0">
                  <td colspan="6" class="text-center text-muted py-3">尚未新增票種</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 右欄 -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <button @click="save()" :disabled="saving" class="btn btn-primary btn-block">
              <i class="fas fa-save"></i>
              <span x-text="saving ? '儲存中...' : (isEdit ? '更新活動' : '建立活動')"></span>
            </button>
            <a href="/admin/events/" class="btn btn-outline-secondary btn-block mt-2">取消</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="main-footer text-center text-sm">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/admin/assets/js/api.js"></script>
<script src="/admin/assets/js/uploader.js"></script>
<script>
adminAuth.requireLogin();

function eventForm() {
  return {
    isEdit: false, eventID: null,
    coverUploading: false, coverError: '',
    saving: false, successMsg: '', errorMsg: '',
    form: {
      title: '', slug: '', category: '路跑',
      event_date: '', location: '',
      reg_start_at: '', reg_end_at: '',
      max_quota: '', description: '',
      cover_image: '', tickets: [],
    },

    async init() {
      const id = new URLSearchParams(location.search).get('id');
      if (id) {
        this.isEdit = true;
        this.eventID = id;
        await this.loadEvent(id);
      }
    },

    async loadEvent(id) {
      const res = await adminApi.get(`/events/${id}`);
      if (res && res.data) {
        const e = res.data;
        this.form = {
          title:       e.title || '',
          slug:        e.slug || '',
          category:    e.category || '路跑',
          event_date:  e.event_date || '',
          location:    e.location || '',
          reg_start_at: e.reg_start_at ? e.reg_start_at.substring(0,16) : '',
          reg_end_at:   e.reg_end_at   ? e.reg_end_at.substring(0,16)   : '',
          max_quota:   e.max_quota || '',
          description: e.description || '',
          cover_image: e.cover_image || '',
          tickets:     (e.tickets || []).map(t => ({
            name:      t.name,
            price:     t.price,
            quota:     t.quota || '',
            reg_start: t.reg_start ? t.reg_start.substring(0,16) : '',
            reg_end:   t.reg_end   ? t.reg_end.substring(0,16)   : '',
          })),
        };
      }
    },

    addTicket() {
      this.form.tickets.push({ name: '', price: 0, quota: '', reg_start: '', reg_end: '' });
    },

    async uploadCover(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.coverUploading = true;
      this.coverError = '';
      try {
        this.form.cover_image = await uploadImage(file, 'events');
      } catch(e) {
        this.coverError = e.message;
      }
      this.coverUploading = false;
    },

    async save() {
      if (!this.form.title) { this.errorMsg = '請填寫活動名稱'; return; }
      if (!this.form.event_date) { this.errorMsg = '請填寫活動日期'; return; }
      if (!this.form.slug) {
        this.form.slug = this.form.title.toLowerCase()
          .replace(/\s+/g, '-').replace(/[^a-z0-9\u4e00-\u9fa5-]/g, '');
      }

      this.saving = true;
      this.successMsg = '';
      this.errorMsg = '';

      const payload = {
        title:       this.form.title,
        slug:        this.form.slug,
        category:    this.form.category,
        event_date:  this.form.event_date,
        location:    this.form.location,
        description: this.form.description,
        cover_image: this.form.cover_image,
        max_quota:   this.form.max_quota ? parseInt(this.form.max_quota) : null,
        reg_start_at: this.form.reg_start_at
          ? this.form.reg_start_at.replace('T', ' ') + ':00' : null,
        reg_end_at:   this.form.reg_end_at
          ? this.form.reg_end_at.replace('T', ' ') + ':00' : null,
      };

      let res;
      if (this.isEdit) {
        res = await adminApi.put(`/events/${this.eventID}`, payload);
      } else {
        res = await adminApi.post('/events', payload);
      }

      if (res && res.data) {
        this.successMsg = this.isEdit ? '活動已更新！' : '活動已建立！';
        if (!this.isEdit) {
          this.eventID = res.data.id;
          this.isEdit = true;
          history.replaceState({}, '', `/admin/events/form.html?id=${res.data.id}`);
        }
      } else {
        this.errorMsg = (res && res.error) || '儲存失敗，請檢查欄位';
      }
      this.saving = false;
      window.scrollTo(0, 0);
    }
  }
}
</script>
</body>
</html>
