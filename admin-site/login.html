<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台登入 - SportsPlatform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="/admin/assets/js/api.js"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm" x-data="loginForm()" x-init="checkAlreadyLoggedIn()">
  <div class="text-center mb-8">
    <div class="text-3xl mb-2">🏃</div>
    <h1 class="text-white text-xl font-bold">SportsPlatform</h1>
    <p class="text-gray-400 text-sm mt-1">後台管理系統</p>
  </div>

  <div class="bg-white rounded-xl shadow-2xl p-8">
    <h2 class="text-lg font-bold text-gray-800 mb-6">管理員登入</h2>

    <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 text-sm p-3 rounded-lg mb-4" x-text="error"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
        <input type="text" x-model="form.username" @keydown.enter="submit()"
          class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="管理員帳號" autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
        <input type="password" x-model="form.password" @keydown.enter="submit()"
          class="w-full border rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="密碼" autocomplete="current-password">
      </div>
      <button @click="submit()" :disabled="loading"
        class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-blue-700 disabled:opacity-50 transition">
        <span x-text="loading ? '登入中...' : '登入'"></span>
      </button>
    </div>
  </div>

  <p class="text-center text-gray-500 text-xs mt-6">僅限授權管理人員存取</p>
</div>

<script>
function loginForm() {
  return {
    form: { username: '', password: '' },
    loading: false,
    error: '',

    checkAlreadyLoggedIn() {
      if (adminAuth.isLoggedIn()) window.location.href = '/admin/';
    },

    async submit() {
      if (!this.form.username || !this.form.password) {
        this.error = '請輸入帳號和密碼'; return;
      }
      this.loading = true;
      this.error = '';
      try {
        const res = await adminApi.post('/auth/login', this.form);
        if (res && res.token) {
          localStorage.setItem('admin_token', res.token);
          localStorage.setItem('admin_info', JSON.stringify(res.admin));
          window.location.href = '/admin/';
        } else {
          this.error = (res && res.error) || '登入失敗';
        }
      } catch(e) {
        this.error = '系統錯誤，請稍後再試';
      }
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
