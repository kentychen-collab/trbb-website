<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 - SportsPlatform</title>
  <!-- AdminLTE -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 登出</a></li>
    </ul>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/admin/" class="brand-link">
      <span class="brand-text font-weight-light">🏃 SportsPlatform 後台</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
          <li class="nav-item"><a href="/admin/" class="nav-link active"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
          <li class="nav-item"><a href="/admin/orders/index.html" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>訂單管理</p></a></li>
          <li class="nav-item"><a href="/admin/products/index.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>商品管理</p></a></li>
          <li class="nav-item"><a href="/admin/events/index.html" class="nav-link"><i class="nav-icon fas fa-calendar"></i><p>活動管理</p></a></li>
          <li class="nav-item"><a href="/admin/second-hand/index.html" class="nav-link"><i class="nav-icon fas fa-recycle"></i><p>二手品審核</p></a></li>
          <li class="nav-item"><a href="/admin/calendar/index.html" class="nav-link"><i class="nav-icon fas fa-flag-checkered"></i><p>賽事行事曆</p></a></li>
          <li class="nav-item"><a href="/admin/members/index.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>會員管理</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content -->
  <div class="content-wrapper">
    <div class="content-header">
      <div class="container-fluid">
        <h1 class="m-0">Dashboard</h1>
      </div>
    </div>

    <section class="content">
      <div class="container-fluid">
        <div class="row" id="stats-row">
          <!-- Stats cards injected by JS -->
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header"><h3 class="card-title">最新訂單</h3></div>
              <div class="card-body p-0">
                <table class="table table-sm">
                  <thead><tr><th>訂單編號</th><th>金額</th><th>狀態</th><th>時間</th></tr></thead>
                  <tbody id="recent-orders"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header"><h3 class="card-title">待審核二手品</h3></div>
              <div class="card-body p-0">
                <table class="table table-sm">
                  <thead><tr><th>標題</th><th>賣家</th><th>操作</th></tr></thead>
                  <tbody id="pending-items"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="main-footer text-sm text-center">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
const statColors = ['info','success','warning','danger'];
const statIcons = ['fa-shopping-cart','fa-users','fa-calendar','fa-recycle'];
const statLabels = ['今日訂單','活躍會員','本月活動','待審核二手'];

async function loadDashboard() {
  const res = await api.get('/admin/dashboard/stats');
  if (!res || !res.data) return;
  const d = res.data;
  const values = [d.today_orders, d.active_members, d.monthly_events, d.pending_items];
  const html = values.map((v, i) => `
    <div class="col-lg-3 col-6">
      <div class="small-box bg-${statColors[i]}">
        <div class="inner"><h3>${v || 0}</h3><p>${statLabels[i]}</p></div>
        <div class="icon"><i class="fas ${statIcons[i]}"></i></div>
        <a href="#" class="small-box-footer">更多 <i class="fas fa-arrow-circle-right"></i></a>
      </div>
    </div>`).join('');
  document.getElementById('stats-row').innerHTML = html;
}

function logout() {
  localStorage.removeItem('access_token');
  window.location.href = '/admin/login.html';
}

loadDashboard();
</script>
</body>
</html>
