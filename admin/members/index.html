<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>會員管理 - SportsPlatform Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
    <ul class="navbar-nav ml-3">
      <li class="nav-item">
        <form class="form-inline ml-3">
          <input id="search-input" class="form-control form-control-sm" type="search" placeholder="搜尋 Email / 姓名">
        </form>
      </li>
    </ul>
  </nav>
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/admin/" class="brand-link"><span class="brand-text font-weight-light">🏃 後台管理</span></a>
    <div class="sidebar"><nav class="mt-2">
      <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
        <li class="nav-item"><a href="/admin/" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
        <li class="nav-item"><a href="/admin/orders/index.html" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>訂單管理</p></a></li>
        <li class="nav-item"><a href="/admin/events/index.html" class="nav-link"><i class="nav-icon fas fa-calendar"></i><p>活動管理</p></a></li>
        <li class="nav-item"><a href="/admin/members/index.html" class="nav-link active"><i class="nav-icon fas fa-users"></i><p>會員管理</p></a></li>
      </ul>
    </nav></div>
  </aside>

  <div class="content-wrapper">
    <div class="content-header"><div class="container-fluid">
      <h1 class="m-0">會員管理</h1>
    </div></div>
    <section class="content"><div class="container-fluid">
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-bordered table-hover mb-0">
            <thead><tr>
              <th>ID</th><th>姓名</th><th>Email</th><th>手機</th><th>角色</th><th>狀態</th><th>註冊日期</th><th>操作</th>
            </tr></thead>
            <tbody id="list-body"><tr><td colspan="8" class="text-center py-4">載入中...</td></tr></tbody>
          </table>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <span id="total-info" class="text-muted text-sm"></span>
          <div id="pagination" class="d-flex gap-2"></div>
        </div>
      </div>
    </div></section>
  </div>
  <footer class="main-footer text-sm text-center">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let page = 1, limit = 20, total = 0;
const roleMap = { 0:'一般', 1:'管理員', 2:'超管' };
const statusMap = { 0:'<span class="badge badge-danger">停用</span>', 1:'<span class="badge badge-success">啟用</span>' };

async function loadList() {
  const res = await api.get(`/admin/members?page=${page}&limit=${limit}`);
  total = (res && res.total) || 0;
  const body = document.getElementById('list-body');
  if (!res || !res.data || res.data.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">暫無資料</td></tr>';
    return;
  }
  body.innerHTML = res.data.map(m => `
    <tr>
      <td>${m.id}</td>
      <td>${m.name}</td>
      <td>${m.email}</td>
      <td>${m.phone || '-'}</td>
      <td>${roleMap[m.role] || m.role}</td>
      <td>${statusMap[m.status] || m.status}</td>
      <td>${m.created_at ? m.created_at.substring(0,10) : '-'}</td>
      <td>
        <button class="btn btn-xs ${m.status===1?'btn-warning':'btn-success'}"
          onclick="toggleStatus(${m.id}, ${m.status===1?0:1})">
          ${m.status===1?'停用':'啟用'}
        </button>
      </td>
    </tr>
  `).join('');
  document.getElementById('total-info').textContent = `共 ${total} 位會員`;
  renderPagination();
}

async function toggleStatus(id, newStatus) {
  if (!confirm(`確定要${newStatus===1?'啟用':'停用'}此會員？`)) return;
  const res = await api.put(`/admin/members/${id}/status`, { status: newStatus });
  if (res && res.message) loadList();
  else alert('操作失敗');
}

function renderPagination() {
  const totalPages = Math.ceil(total / limit);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="btn btn-sm btn-outline-secondary" onclick="page--;loadList()" ${page===1?'disabled':''}>上一頁</button>
    <span class="align-self-center small">${page} / ${totalPages}</span>
    <button class="btn btn-sm btn-outline-secondary" onclick="page++;loadList()" ${page>=totalPages?'disabled':''}>下一頁</button>
  `;
}

loadList();
</script>
</body>
</html>
