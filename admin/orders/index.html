        <li class="nav-item"><a href="/admin/products/index.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>商品管理</p></a></li>

      </ul>
    </nav></div>

  <div class="content-wrapper">
    <div class="content-header"><div class="container-fluid"><h1>orders 管理</h1></div></div>
    <section class="content"><div class="container-fluid">
      <div class="card">
        <div class="card-header d-flex justify-content-between">
          <h3 class="card-title">orders 列表</h3>
          <button class="btn btn-primary btn-sm" onclick="showCreate()"><i class="fas fa-plus"></i> 新增</button>
        </div>
        <div class="card-body p-0">
          <table class="table table-bordered table-striped">
            <thead><tr><th>ID</th><th>名稱</th><th>狀態</th><th>建立時間</th><th>操作</th></tr></thead>
            <tbody id="list-body"><tr><td colspan="5" class="text-center py-4">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div></section>
  </div>
  <footer class="main-footer text-sm text-center">SportsPlatform Admin © 2025</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
async function loadList() {
  const res = await api.get('/admin/orders');
  const body = document.getElementById('list-body');
  if (!res || !res.data || res.data.length === 0) {
    body.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">暫無資料</td></tr>';
    return;
  }
  body.innerHTML = res.data.map(item => `
    <tr>
      <td>${item.id}</td>
      <td>${item.name || item.title || '-'}</td>
      <td><span class="badge badge-${item.status===1?'success':'secondary'}">${item.status===1?'啟用':'停用'}</span></td>
      <td>${item.created_at ? new Date(item.created_at).toLocaleDateString('zh-TW') : '-'}</td>
      <td><button class="btn btn-xs btn-info" onclick="editItem(${item.id})">編輯</button></td>
    </tr>
  `).join('');
}
function showCreate() { alert('TODO: 開啟新增表單'); }
function editItem(id) { alert('TODO: 編輯 ID=' + id); }
loadList();
</script>
</body>
