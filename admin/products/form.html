<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>商品表單 - Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    .img-preview { width:100px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #ddd; }
    .upload-btn  { cursor:pointer; }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-dark navbar-gray-dark">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="/admin/products/">← 返回列表</a></li>
    </ul>
    <ul class="navbar-nav ml-auto"><li class="nav-item"><a class="nav-link" href="#" onclick="adminAuth.logout()"><i class="fas fa-sign-out-alt"></i></a></li></ul>
  </nav>

  <div class="content-wrapper p-4" x-data="productForm()" x-init="init()">
    <h4 class="mb-4" x-text="isEdit ? '編輯商品' : '新增商品'"></h4>

    <div x-show="successMsg" class="alert alert-success" x-text="successMsg"></div>
    <div x-show="errorMsg"   class="alert alert-danger"  x-text="errorMsg"></div>

    <div class="row">
      <!-- 左欄 -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">基本資料</h5></div>
          <div class="card-body">
            <div class="form-group">
              <label>商品名稱 *</label>
              <input type="text" x-model="form.name" class="form-control" @input="autoSlug()">
            </div>
            <div class="form-group">
              <label>網址 Slug</label>
              <input type="text" x-model="form.slug" class="form-control" placeholder="自動產生">
            </div>
            <div class="form-group">
              <label>商品說明</label>
              <textarea x-model="form.description" class="form-control" rows="5"></textarea>
            </div>
          </div>
        </div>

        <!-- 圖片 -->
        <div class="card mt-3">
          <div class="card-header"><h5 class="card-title mb-0">商品圖片</h5></div>
          <div class="card-body">
            <label class="d-block mb-2">封面圖片</label>
            <div class="d-flex align-items-center gap-3 mb-3">
              <img x-show="form.cover_image" :src="form.cover_image" class="img-preview">
              <div x-show="!form.cover_image" class="img-preview d-flex align-items-center justify-content-center bg-light text-muted">
                <span>無圖片</span>
              </div>
              <div>
                <label class="btn btn-outline-secondary btn-sm upload-btn">
                  <i class="fas fa-upload"></i>
                  <span x-text="coverUploading ? '上傳中...' : '選擇圖片'"></span>
                  <input type="file" accept="image/*" class="d-none" @change="uploadCover($event)">
                </label>
                <button x-show="form.cover_image" @click="form.cover_image=''" class="btn btn-outline-danger btn-sm ml-1">移除</button>
              </div>
            </div>
            <p x-show="coverError" class="text-danger small" x-text="coverError"></p>
          </div>
        </div>
      </div>

      <!-- 右欄 -->
      <div class="col-md-4">
        <!-- 定價庫存 -->
        <div class="card">
          <div class="card-header"><h5 class="card-title mb-0">定價與庫存</h5></div>
          <div class="card-body">
            <div class="form-group">
              <label>分類 *</label>
              <select x-model="form.category_id" class="form-control">
                <option value="">選擇分類</option>
                <template x-for="c in categories" :key="c.id">
                  <option :value="c.id" x-text="c.name"></option>
                </template>
              </select>
            </div>
            <div class="form-group">
              <label>售價 (NT$) *</label>
              <input type="number" x-model="form.price" class="form-control" min="0">
            </div>
            <div class="form-group">
              <label>特價 (NT$) <small class="text-muted">選填，需低於售價</small></label>
              <input type="number" x-model="form.sale_price" class="form-control" min="0">
            </div>
            <div class="form-group">
              <label>庫存數量</label>
              <input type="number" x-model="form.stock" class="form-control" min="0">
            </div>
            <div class="form-group">
              <label>狀態</label>
              <select x-model="form.status" class="form-control">
                <option value="1">上架</option>
                <option value="0">下架（草稿）</option>
              </select>
            </div>
            <div class="form-check mb-3">
              <input type="checkbox" class="form-check-input" id="featured" x-model="form.is_featured">
              <label class="form-check-label" for="featured">設為精選商品（首頁顯示）</label>
            </div>
          </div>
        </div>

        <!-- 儲存按鈕 -->
        <div class="card">
          <div class="card-body">
            <button @click="save()" :disabled="saving" class="btn btn-primary btn-block">
              <i class="fas fa-save"></i>
              <span x-text="saving ? '儲存中...' : (isEdit ? '更新商品' : '建立商品')"></span>
            </button>
            <a href="/admin/products/" class="btn btn-outline-secondary btn-block mt-2">取消</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <footer class="main-footer text-center text-sm">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/admin/assets/js/api.js"></script>
<script src="/admin/assets/js/uploader.js"></script>
<script>
adminAuth.requireLogin();

function productForm() {
  return {
    isEdit: false,
    productID: null,
    categories: [],
    coverUploading: false,
    coverError: '',
    saving: false,
    successMsg: '',
    errorMsg: '',
    form: {
      name: '', slug: '', description: '',
      cover_image: '', images: [],
      category_id: '', price: '', sale_price: '',
      stock: 0, status: 1, is_featured: false,
    },
    slugManual: false,

    async init() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (id) {
        this.isEdit = true;
        this.productID = id;
        await this.loadProduct(id);
      }
      await this.loadCategories();
    },

    async loadCategories() {
      const res = await adminApi.get('/categories');
      this.categories = (res && res.data) || [];
    },

    async loadProduct(id) {
      const res = await adminApi.get(`/products/${id}`);
      if (res && res.data) {
        const p = res.data;
        this.form = {
          name:        p.name || '',
          slug:        p.slug || '',
          description: p.description || '',
          cover_image: p.cover_image || '',
          images:      p.images || [],
          category_id: String(p.category_id || ''),
          price:       p.price || '',
          sale_price:  p.sale_price || '',
          stock:       p.stock || 0,
          status:      p.status ?? 1,
          is_featured: !!p.is_featured,
        };
        this.slugManual = true;
      }
    },

    autoSlug() {
      if (this.slugManual) return;
      this.form.slug = this.form.name
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\u4e00-\u9fa5-]/g, '');
    },

    async uploadCover(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.coverUploading = true;
      this.coverError = '';
      try {
        this.form.cover_image = await uploadImage(file, 'products');
      } catch(e) {
        this.coverError = e.message;
      }
      this.coverUploading = false;
    },

    async save() {
      this.saving = true;
      this.successMsg = '';
      this.errorMsg = '';

      const payload = {
        category_id:  parseInt(this.form.category_id) || 0,
        name:         this.form.name,
        slug:         this.form.slug,
        description:  this.form.description,
        cover_image:  this.form.cover_image,
        images:       this.form.images || [],
        price:        parseFloat(this.form.price) || 0,
        sale_price:   this.form.sale_price ? parseFloat(this.form.sale_price) : null,
        stock:        parseInt(this.form.stock) || 0,
        status:       parseInt(this.form.status),
        is_featured:  this.form.is_featured ? 1 : 0,
      };

      let res;
      if (this.isEdit) {
        res = await adminApi.put(`/products/${this.productID}`, payload);
      } else {
        res = await adminApi.post('/products', payload);
      }

      if (res && res.data) {
        this.successMsg = this.isEdit ? '商品已更新！' : '商品已建立！';
        if (!this.isEdit) {
          this.productID = res.data.id;
          this.isEdit = true;
          history.replaceState({}, '', `/admin/products/form.html?id=${res.data.id}`);
        }
      } else {
        this.errorMsg = (res && res.error) || '儲存失敗';
      }
      this.saving = false;
      window.scrollTo(0, 0);
    }
  }
}
</script>
</body>
</html>
