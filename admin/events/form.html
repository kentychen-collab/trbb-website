<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動管理 - SportsPlatform Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" href="/admin/events/index.html"><i class="fas fa-arrow-left"></i> 返回列表</a></li>
    </ul>
  </nav>

  <div class="content-wrapper p-4">
    <h1 class="h4 mb-4" id="form-title">新增活動</h1>

    <div class="row">
      <div class="col-md-8">
        <div class="card">
          <div class="card-body">
            <div class="form-group">
              <label>活動名稱 *</label>
              <input type="text" id="title" class="form-control">
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>網址 Slug *</label>
                  <input type="text" id="slug" class="form-control" placeholder="taipei-marathon-2025">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>類別</label>
                  <select id="category" class="form-control">
                    <option value="路跑">路跑</option>
                    <option value="鐵人三項">鐵人三項</option>
                    <option value="登山">登山</option>
                    <option value="自行車">自行車</option>
                    <option value="游泳">游泳</option>
                    <option value="其他">其他</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>活動日期 *</label>
                  <input type="date" id="event_date" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>活動地點</label>
                  <input type="text" id="location" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>報名開始</label>
                  <input type="datetime-local" id="reg_start_at" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>報名截止</label>
                  <input type="datetime-local" id="reg_end_at" class="form-control">
                </div>
              </div>
            </div>
            <div class="form-group">
              <label>最大名額（空白=不限）</label>
              <input type="number" id="max_quota" class="form-control" placeholder="200">
            </div>
            <div class="form-group">
              <label>封面圖片 URL</label>
              <input type="text" id="cover_image" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
              <label>活動說明</label>
              <textarea id="description" class="form-control" rows="5"></textarea>
            </div>
          </div>
        </div>

        <!-- 票種管理 -->
        <div class="card mt-3">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title">票種設定</h3>
            <button class="btn btn-sm btn-outline-primary" onclick="addTicketRow()">+ 新增票種</button>
          </div>
          <div class="card-body p-0">
            <table class="table table-sm mb-0" id="tickets-table">
              <thead><tr>
                <th>票種名稱</th><th>價格</th><th>名額</th><th>報名開始</th><th>報名截止</th><th></th>
              </tr></thead>
              <tbody id="tickets-body">
                <tr id="no-tickets"><td colspan="6" class="text-center text-muted py-3">尚未新增票種</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card">
          <div class="card-body">
            <button class="btn btn-primary btn-block mb-2" onclick="submitForm()">
              <i class="fas fa-save"></i> 儲存活動
            </button>
            <a href="/admin/events/index.html" class="btn btn-outline-secondary btn-block">取消</a>
          </div>
        </div>
        <div id="result-msg" class="mt-3 d-none"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let ticketCount = 0;

function addTicketRow(data) {
  ticketCount++;
  document.getElementById('no-tickets')?.remove();
  const row = document.createElement('tr');
  row.id = 'ticket-' + ticketCount;
  row.innerHTML = `
    <td><input type="text" class="form-control form-control-sm" placeholder="早鳥票" value="${data?.name||''}"></td>
    <td><input type="number" class="form-control form-control-sm" placeholder="0" value="${data?.price||''}"></td>
    <td><input type="number" class="form-control form-control-sm" placeholder="不限" value="${data?.quota||''}"></td>
    <td><input type="datetime-local" class="form-control form-control-sm" value="${data?.reg_start||''}"></td>
    <td><input type="datetime-local" class="form-control form-control-sm" value="${data?.reg_end||''}"></td>
    <td><button class="btn btn-xs btn-danger" onclick="document.getElementById('ticket-${ticketCount}').remove()">✕</button></td>
  `;
  document.getElementById('tickets-body').appendChild(row);
}

function getTickets() {
  const rows = document.querySelectorAll('#tickets-body tr:not(#no-tickets)');
  return Array.from(rows).map(row => {
    const inputs = row.querySelectorAll('input');
    return {
      name: inputs[0].value,
      price: parseFloat(inputs[1].value) || 0,
      quota: inputs[2].value ? parseInt(inputs[2].value) : null,
      reg_start: inputs[3].value ? inputs[3].value.replace('T',' ') + ':00' : null,
      reg_end: inputs[4].value ? inputs[4].value.replace('T',' ') + ':00' : null,
    };
  }).filter(t => t.name);
}

async function submitForm() {
  const maxQuota = document.getElementById('max_quota').value;
  const regStart = document.getElementById('reg_start_at').value;
  const regEnd = document.getElementById('reg_end_at').value;
  const payload = {
    title: document.getElementById('title').value,
    slug: document.getElementById('slug').value,
    category: document.getElementById('category').value,
    event_date: document.getElementById('event_date').value,
    location: document.getElementById('location').value,
    cover_image: document.getElementById('cover_image').value,
    description: document.getElementById('description').value,
    max_quota: maxQuota ? parseInt(maxQuota) : null,
    reg_start_at: regStart ? regStart.replace('T',' ') + ':00' : null,
    reg_end_at: regEnd ? regEnd.replace('T',' ') + ':00' : null,
  };

  const msgEl = document.getElementById('result-msg');
  const res = await api.post('/admin/events', payload);
  if (res && res.data) {
    msgEl.className = 'alert alert-success mt-3';
    msgEl.textContent = '活動已建立！ID: ' + res.data.id;
    msgEl.classList.remove('d-none');
    setTimeout(() => window.location.href = '/admin/events/index.html', 1500);
  } else {
    msgEl.className = 'alert alert-danger mt-3';
    msgEl.textContent = '建立失敗：' + ((res && res.error) || '未知錯誤');
    msgEl.classList.remove('d-none');
  }
}

// Auto-generate slug from title
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('title').addEventListener('input', function() {
    const slugEl = document.getElementById('slug');
    if (!slugEl.dataset.manual) {
      slugEl.value = this.value.toLowerCase()
        .replace(/\s+/g, '-').replace(/[^a-z0-9\u4e00-\u9fa5-]/g, '');
    }
  });
  document.getElementById('slug').addEventListener('input', function() {
    this.dataset.manual = '1';
  });
});
</script>
</body>
</html>
