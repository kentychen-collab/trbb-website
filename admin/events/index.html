<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動管理 - SportsPlatform Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/">Dashboard</a></li>
    </ul>
  </nav>
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/admin/" class="brand-link"><span class="brand-text font-weight-light">🏃 後台管理</span></a>
    <div class="sidebar"><nav class="mt-2">
      <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
        <li class="nav-item"><a href="/admin/" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
        <li class="nav-item"><a href="/admin/orders/index.html" class="nav-link"><i class="nav-icon fas fa-shopping-cart"></i><p>訂單管理</p></a></li>
        <li class="nav-item"><a href="/admin/products/index.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>商品管理</p></a></li>
        <li class="nav-item"><a href="/admin/events/index.html" class="nav-link active"><i class="nav-icon fas fa-calendar"></i><p>活動管理</p></a></li>
        <li class="nav-item"><a href="/admin/second-hand/index.html" class="nav-link"><i class="nav-icon fas fa-recycle"></i><p>二手品審核</p></a></li>
        <li class="nav-item"><a href="/admin/members/index.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>會員管理</p></a></li>
      </ul>
    </nav></div>
  </aside>

  <div class="content-wrapper">
    <div class="content-header"><div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="m-0">活動管理</h1>
        <a href="/admin/events/form.html" class="btn btn-primary btn-sm">
          <i class="fas fa-plus"></i> 新增活動
        </a>
      </div>
    </div></div>

    <section class="content"><div class="container-fluid">
      <div class="card">
        <div class="card-body p-0">
          <table class="table table-bordered table-striped mb-0">
            <thead>
              <tr><th>ID</th><th>活動名稱</th><th>類別</th><th>日期</th><th>地點</th><th>狀態</th><th>操作</th></tr>
            </thead>
            <tbody id="list-body">
              <tr><td colspan="7" class="text-center py-4">載入中...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <span id="total-info" class="text-sm text-muted"></span>
          <div id="pagination"></div>
        </div>
      </div>
    </div></section>
  </div>
  <footer class="main-footer text-sm text-center">SportsPlatform Admin © 2025</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let page = 1, limit = 20, total = 0;

const statusMap = { 0:'<span class="badge badge-secondary">草稿</span>', 1:'<span class="badge badge-success">上架</span>' };

async function loadList() {
  const res = await api.get(`/admin/events?page=${page}&limit=${limit}`);
  total = (res && res.total) || 0;
  const body = document.getElementById('list-body');
  if (!res || !res.data || res.data.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">暫無資料</td></tr>';
    return;
  }
  body.innerHTML = res.data.map(e => `
    <tr>
      <td>${e.id}</td>
      <td><a href="/events/detail.html?slug=${e.slug}" target="_blank">${e.title}</a></td>
      <td>${e.category || '-'}</td>
      <td>${e.event_date || '-'}</td>
      <td>${e.location || '-'}</td>
      <td>${statusMap[e.status] || e.status}</td>
      <td>
        <a href="/admin/events/form.html?id=${e.id}" class="btn btn-xs btn-info">編輯</a>
      </td>
    </tr>
  `).join('');
  document.getElementById('total-info').textContent = `共 ${total} 筆`;
}

loadList();
</script>
</body>
</html>
