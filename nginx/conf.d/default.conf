# ════════════════════════════════════════════════════════════
# ADMIN FRONTEND — admin.trbbtw.com
# ════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name admin.trbbtw.com;

    root /var/www/admin;
    index index.html;

    # Restrict to internal/VPN IPs in production
    # allow 10.0.0.0/8;
    # deny  all;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /v1/admin/ {
        proxy_pass         http://trbb_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /v1/third/ {
        proxy_pass         http://trbb_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ════════════════════════════════════════════════════════════
# IMAGES CDN — images.trbbtw.com → MinIO proxy
# ════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name images.trbbtw.com;

    # images.trbbtw.com/images/events/xxx.jpg
    # → MinIO: http://minio:9000/images/events/xxx.jpg
    location / {
        proxy_pass         http://trbb_minio;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;

        proxy_cache        img_cache;
        proxy_cache_valid  200 7d;
        proxy_cache_valid  404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header         X-Cache-Status    $upstream_cache_status always;

        add_header         Access-Control-Allow-Origin  "*" always;
        add_header         Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header         Access-Control-Allow-Headers "Range" always;

        expires            7d;
        add_header         Cache-Control "public, immutable";
    }
}

# ════════════════════════════════════════════════════════════
# HEALTH CHECK (internal)
# ════════════════════════════════════════════════════════════
server {
    listen 8088;
    server_name _;
    location /nginx-health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
