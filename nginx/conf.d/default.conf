# ════════════════════════════════════════════════════════════
# DEFAULT — catch-all (redirect to main site)
# ════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    server_name _;
    return 301 http://trbbtw.com$request_uri;
}

# ════════════════════════════════════════════════════════════
# WEB FRONTEND — trbbtw.com / www.trbbtw.com
# ════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name trbbtw.com www.trbbtw.com;

    root /var/www/web;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy → Go backend
    location /v1/api/ {
        proxy_pass         http://trbb_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Third-party callbacks proxy
    location /v1/third/ {
        proxy_pass         http://trbb_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

